<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>JavaScript</title>

        <script>
           
            function somar(){
               const n1 = document.getElementById("n1").value
               const n2 = document.getElementById("n2").value

               const soma = Number(n1) + Number(n2)

               const resultado = document.getElementById("resultado")

               resultado.innerHTML = "= " + soma
            }

            function subtrair(){
               const n1 = document.getElementById("n1").value
               const n2 = document.getElementById("n2").value

               const subtrair = Number(n1) - Number(n2)

               const resultado = document.getElementById("resultado")

               resultado.innerHTML = "= " + subtrair
            }

            function multiplicar(){
               const n1 = document.getElementById("n1").value
               const n2 = document.getElementById("n2").value

               const multiplicar = Number(n1) * Number(n2)

               const resultado = document.getElementById("resultado")

               resultado.innerHTML = "= " + multiplicar
            }

            function dividir(){
               const n1 = document.getElementById("n1").value
               const n2 = document.getElementById("n2").value

               const dividir = Number(n1) / Number(n2)

               const resultado = document.getElementById("resultado")

               resultado.innerHTML = "= " + dividir
            }
            
        </script>

    </head>
    <body>



            N1: <input type="text" id="n1"/><br>
            N2: <input type="text" id="n2"/><br>

            <input type="button" value="somar" onclick="somar()"><br>
            <input type="button" value="subtrair" onclick="subtrair()"><br>
            <input type="button" value="multiplicar" onclick="multiplicar()"><br>
            <input type="button" value="dividir" onclick="dividir()"><br>

            <h1 id="resultado">= </h1>


        







    </body>
</html>
